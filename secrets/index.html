<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secrets - Alpha City</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #050816;
            --panel: rgba(12, 18, 36, 0.9);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #facc15;
            --accent-soft: rgba(250, 204, 21, 0.16);
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, rgba(59, 130, 246, 0.16), transparent 34%),
                radial-gradient(circle at bottom right, rgba(250, 204, 21, 0.12), transparent 28%),
                var(--bg);
            color: var(--text);
        }

        .shell {
            width: min(100%, 720px);
            padding: 28px;
            border-radius: 28px;
            border: 1px solid var(--panel-border);
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .state {
            display: grid;
            justify-items: center;
            gap: 24px;
            text-align: center;
        }

        .state--locked {
            cursor: pointer;
        }

        .state--locked:focus-visible,
        .message-button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 8px;
        }

        .portrait {
            width: min(100%, 360px);
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
            background: rgba(255, 255, 255, 0.04);
        }

        .message,
        .message-button {
            margin: 0;
            font-size: clamp(1.25rem, 2vw, 1.8rem);
            line-height: 1.5;
            max-width: 24ch;
            color: var(--text);
        }

        .message-button {
            padding: 0;
            border: 0;
            background: transparent;
            font: inherit;
            cursor: pointer;
        }

        .state--locked .message-button {
            color: var(--accent);
            text-shadow: 0 0 24px rgba(250, 204, 21, 0.12);
        }

        .state--locked:hover .portrait,
        .state--locked:hover .message-button {
            transform: translateY(-2px);
        }

        .state--locked .portrait,
        .state--locked .message-button {
            transition: transform 160ms ease, opacity 160ms ease;
        }

        .state--loading {
            cursor: wait;
        }

        .state--loading .portrait,
        .state--loading .message-button {
            opacity: 0.8;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 640px) {
            .shell {
                padding: 20px;
                border-radius: 22px;
            }

            .state {
                gap: 20px;
            }

            .portrait {
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section id="locked-state" class="state state--locked" tabindex="0" role="button" aria-label="Verify CITY holdings">
            <img
                class="portrait"
                src="https://i.postimg.cc/bvZXMRN5/meat-king-Front-facing-cyberpunk-NFT-character-portrait-High-ad11f5b8-8532-485b-a1a8-df68ebe0e02e-2.png"
                alt="Alpha City access gate"
            >
            <button id="verify-trigger" type="button" class="message-button">Verify $CITY holdings (5 million or more) to continue</button>
        </section>

        <section id="verified-state" class="state" hidden>
            <img
                class="portrait"
                src="https://i.postimg.cc/bwKLy0Rc/meat-king-Front-facing-cyberpunk-NFT-character-portrait-High-3c3f7421-2784-4bd2-b289-d9d5579ec5d8-3.png"
                alt="Alpha City inner circle"
            >
            <p class="message">Welcome to the inner circle, friend. Keep an eye on this space. There are mysteries afoot.</p>
        </section>

        <p id="sr-status" class="sr-only" aria-live="polite"></p>
    </main>

    <script>
        const SUI_RPC = 'https://fullnode.mainnet.sui.io';
        const CITY_TYPE = '0x308fa16c7aead43e3a49a4ff2e76205ba2a12697234f4fe80a2da66515284060::city::CITY';
        const CITY_STAKING_TYPE = '0x008856d5d6d60a088f6153dbe6f7697d19f81d1d0403695c9e9fbaecdc8b29a9::city_staking::UserStake<0x308fa16c7aead43e3a49a4ff2e76205ba2a12697234f4fe80a2da66515284060::city::CITY>';
        const MIN_CITY_TOTAL = 5_000_000n * 10n ** 9n;
        const MAX_OBJECTS_PER_PAGE = 100;
        const SUI_MAINNET_CHAIN = 'sui:mainnet';
        const STORAGE_KEY_PROVIDER = 'ac_secrets_provider';
        const STORAGE_KEY_ACCOUNT = 'ac_secrets_account';
        const INSUFFICIENT_HOLDINGS_MESSAGE = 'Wallet verified, but holdings are below five million CITY.';

        const registeredWallets = new Set();
        let walletListCache;
        let activeWalletEntry = null;
        let activeAddress = null;
        let isBusy = false;

        const lockedState = document.getElementById('locked-state');
        const verifiedState = document.getElementById('verified-state');
        const verifyTrigger = document.getElementById('verify-trigger');
        const srStatus = document.getElementById('sr-status');
        const lockedCopy = 'Verify $CITY holdings (5 million or more) to continue';
        const loadingCopy = 'Checking your $CITY holdings...';

        function setSrStatus(message) {
            srStatus.textContent = message;
        }

        function setLoadingState(loading) {
            isBusy = loading;
            lockedState.classList.toggle('state--loading', loading);
            lockedState.setAttribute('aria-busy', loading ? 'true' : 'false');
            verifyTrigger.disabled = loading;
            verifyTrigger.textContent = loading ? loadingCopy : lockedCopy;
        }

        function showLockedState() {
            verifiedState.hidden = true;
            lockedState.hidden = false;
            setLoadingState(false);
        }

        function showVerifiedState() {
            lockedState.hidden = true;
            verifiedState.hidden = false;
            setSrStatus('Access granted.');
        }

        function persistSession(providerName, address) {
            try {
                window.localStorage.setItem(STORAGE_KEY_PROVIDER, providerName || '');
                window.localStorage.setItem(STORAGE_KEY_ACCOUNT, address || '');
            } catch (_) {}
        }

        function clearPersistedSession() {
            try {
                window.localStorage.removeItem(STORAGE_KEY_PROVIDER);
                window.localStorage.removeItem(STORAGE_KEY_ACCOUNT);
            } catch (_) {}
        }

        function loadPersistedSession() {
            try {
                const providerName = window.localStorage.getItem(STORAGE_KEY_PROVIDER) || '';
                const address = window.localStorage.getItem(STORAGE_KEY_ACCOUNT) || '';
                return providerName ? { providerName, address } : null;
            } catch (_) {
                return null;
            }
        }

        function isValidSuiAddress(value) {
            return /^0x[0-9a-fA-F]{40,64}$/.test((value || '').trim());
        }

        function registerWallet(wallet) {
            walletListCache = undefined;
            registeredWallets.add(wallet);
        }

        function getRegisteredWallets() {
            if (!walletListCache) {
                walletListCache = [...registeredWallets];
            }
            return walletListCache;
        }

        class WalletStandardEvent extends Event {
            #api;
            get detail() {
                return this.#api;
            }
            get type() {
                return 'wallet-standard:app-ready';
            }
            constructor(api) {
                super('wallet-standard:app-ready', { bubbles: false, cancelable: false, composed: false });
                this.#api = api;
            }
        }

        function initWalletStandard() {
            const appApi = Object.freeze({ register: (...wallets) => wallets.forEach(registerWallet) });
            try {
                window.addEventListener('wallet-standard:register-wallet', (event) => event.detail(appApi));
            } catch (_) {}
            try {
                window.dispatchEvent(new WalletStandardEvent(appApi));
            } catch (_) {}
        }

        function isSuiWallet(wallet) {
            if (!wallet.features?.['standard:connect']) {
                return false;
            }
            const chains = wallet.chains || [];
            return chains.length === 0 || chains.some((chain) => typeof chain === 'string' && chain.startsWith('sui:'));
        }

        function discoverWallets() {
            const found = [];
            const seen = new Set();

            for (const wallet of getRegisteredWallets()) {
                if (isSuiWallet(wallet) && !seen.has(wallet.name)) {
                    seen.add(wallet.name);
                    found.push({ source: 'standard', name: wallet.name, wallet });
                }
            }

            const legacy = [
                { name: 'Slush', obj: window.slush?.sui || window.slush },
                { name: 'Sui Wallet', obj: window.suiWallet },
                { name: 'Sui', obj: window.sui },
                { name: 'Martian', obj: window.martian?.sui || window.martian },
                { name: 'Ethos', obj: window.ethos?.sui || window.ethos },
            ];

            for (const candidate of legacy) {
                if (candidate.obj && !seen.has(candidate.name)) {
                    seen.add(candidate.name);
                    found.push({ source: 'legacy', name: candidate.name, provider: candidate.obj });
                }
            }

            return found;
        }

        function wait(ms) {
            return new Promise((resolve) => window.setTimeout(resolve, ms));
        }

        async function getWalletOptions() {
            let wallets = discoverWallets();
            if (!wallets.length) {
                await wait(600);
                wallets = discoverWallets();
            }
            if (!wallets.length) {
                await wait(1200);
                wallets = discoverWallets();
            }
            return wallets;
        }

        function makeOverlay() {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.inset = '0';
            overlay.style.zIndex = '50';
            overlay.style.display = 'flex';
            overlay.style.alignItems = 'center';
            overlay.style.justifyContent = 'center';
            overlay.style.padding = '16px';
            overlay.style.background = 'rgba(5, 8, 22, 0.82)';
            overlay.style.backdropFilter = 'blur(12px)';
            return overlay;
        }

        function showSelection(title, options, formatter) {
            return new Promise((resolve) => {
                const overlay = makeOverlay();
                const card = document.createElement('div');
                card.style.width = 'min(100%, 360px)';
                card.style.padding = '20px';
                card.style.borderRadius = '22px';
                card.style.border = '1px solid rgba(255, 255, 255, 0.08)';
                card.style.background = 'rgba(12, 18, 36, 0.96)';
                card.style.boxShadow = '0 24px 80px rgba(0, 0, 0, 0.48)';

                const heading = document.createElement('h2');
                heading.textContent = title;
                heading.style.margin = '0 0 14px';
                heading.style.fontSize = '1.1rem';
                heading.style.color = '#f8fafc';
                card.appendChild(heading);

                const list = document.createElement('div');
                list.style.display = 'grid';
                list.style.gap = '10px';

                options.forEach((option) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.textContent = formatter(option);
                    button.style.width = '100%';
                    button.style.padding = '12px 14px';
                    button.style.borderRadius = '14px';
                    button.style.border = '1px solid rgba(255, 255, 255, 0.08)';
                    button.style.background = 'rgba(15, 23, 42, 0.94)';
                    button.style.color = '#f8fafc';
                    button.style.font = 'inherit';
                    button.style.cursor = 'pointer';
                    button.style.textAlign = 'left';
                    button.addEventListener('click', () => {
                        document.body.removeChild(overlay);
                        resolve(option);
                    });
                    list.appendChild(button);
                });

                const cancel = document.createElement('button');
                cancel.type = 'button';
                cancel.textContent = 'Cancel';
                cancel.style.marginTop = '14px';
                cancel.style.width = '100%';
                cancel.style.padding = '10px 14px';
                cancel.style.borderRadius = '14px';
                cancel.style.border = '1px solid transparent';
                cancel.style.background = 'transparent';
                cancel.style.color = '#94a3b8';
                cancel.style.font = 'inherit';
                cancel.style.cursor = 'pointer';
                cancel.addEventListener('click', () => {
                    document.body.removeChild(overlay);
                    resolve(null);
                });

                card.appendChild(list);
                card.appendChild(cancel);
                overlay.appendChild(card);
                document.body.appendChild(overlay);
            });
        }

        async function pickWallet(wallets) {
            return wallets.length === 1 ? wallets[0] : showSelection('Select Wallet', wallets, (wallet) => wallet.name);
        }

        async function pickAccount(accounts) {
            return accounts.length === 1
                ? accounts[0]
                : showSelection('Select Account', accounts, (account) => String(account?.address || account || 'Unknown account'));
        }

        async function disconnectActiveWallet() {
            if (activeWalletEntry?.source === 'standard') {
                try {
                    const feature = activeWalletEntry.wallet.features?.['standard:disconnect'];
                    if (feature?.disconnect) {
                        await feature.disconnect();
                    }
                } catch (_) {}
            } else if (activeWalletEntry?.source === 'legacy') {
                try {
                    if (typeof activeWalletEntry.provider?.disconnect === 'function') {
                        await activeWalletEntry.provider.disconnect();
                    }
                } catch (_) {}
            }
            activeWalletEntry = null;
            activeAddress = null;
            clearPersistedSession();
        }

        async function connectWallet(preferredProviderName = '', options = {}) {
            const { silent = false } = options;
            const wallets = await getWalletOptions();
            if (!wallets.length) {
                throw new Error('No Sui wallet found. Please install a supported wallet extension and refresh the page.');
            }

            let walletOptions = wallets;
            if (preferredProviderName) {
                const preferred = wallets.find((wallet) => wallet.name === preferredProviderName);
                if (preferred) {
                    walletOptions = [preferred, ...wallets.filter((wallet) => wallet !== preferred)];
                }
            }

            const entry = await pickWallet(walletOptions);
            if (!entry) {
                return null;
            }

            let accounts = [];
            if (entry.source === 'standard') {
                const response = silent
                    ? await entry.wallet.features['standard:connect'].connect({ silent: true })
                    : await entry.wallet.features['standard:connect'].connect();
                accounts = response?.accounts || entry.wallet.accounts || [];
            } else {
                const provider = entry.provider;
                if (typeof provider.connect === 'function') {
                    await provider.connect();
                }
                if (typeof provider.getAccounts === 'function') {
                    accounts = await provider.getAccounts();
                } else if (Array.isArray(provider.accounts)) {
                    accounts = provider.accounts;
                } else if (provider.account) {
                    accounts = [provider.account];
                }
            }

            const suiAccounts = accounts.filter((account) => !account?.chains || account.chains.includes(SUI_MAINNET_CHAIN));
            const candidateAccounts = suiAccounts.length ? suiAccounts : accounts;
            const account = await pickAccount(candidateAccounts);
            if (!account) {
                return null;
            }

            const address = String(account?.address || account || '').trim();
            if (!isValidSuiAddress(address)) {
                throw new Error('Wallet did not provide a valid Sui address. Please reconnect your wallet.');
            }

            activeWalletEntry = entry;
            activeAddress = address;
            persistSession(entry.name, address);
            return address;
        }

        async function rpc(method, params) {
            const response = await fetch(SUI_RPC, {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params }),
            });
            if (!response.ok) {
                throw new Error('Sui RPC request failed.');
            }
            const payload = await response.json();
            if (payload.error) {
                throw new Error(payload.error.message || 'Sui RPC error');
            }
            return payload.result;
        }

        async function fetchLiquidCity(address) {
            const balances = await rpc('suix_getAllBalances', [address]);
            const match = (balances || []).find((balance) => balance.coinType === CITY_TYPE);
            return BigInt(match?.totalBalance || '0');
        }

        async function fetchStakedCity(address) {
            let total = 0n;
            let cursor = null;
            for (;;) {
                const result = await rpc('suix_getOwnedObjects', [
                    address,
                    { filter: { StructType: CITY_STAKING_TYPE }, options: { showContent: true } },
                    cursor,
                    MAX_OBJECTS_PER_PAGE,
                ]);
                for (const row of (result?.data || [])) {
                    const amount = row?.data?.content?.fields?.staked_amount;
                    if (amount !== undefined && amount !== null) {
                        total += BigInt(amount);
                    }
                }
                if (!result?.hasNextPage) {
                    break;
                }
                cursor = result.nextCursor;
                if (!cursor) {
                    break;
                }
            }
            return total;
        }

        async function hasRequiredCity(address) {
            const [liquid, staked] = await Promise.all([
                fetchLiquidCity(address),
                fetchStakedCity(address),
            ]);
            return (liquid + staked) >= MIN_CITY_TOTAL;
        }

        async function verifyAccess() {
            if (isBusy) {
                setSrStatus('CITY verification is already in progress.');
                return;
            }

            setLoadingState(true);
            setSrStatus('Checking CITY holdings.');

            try {
                let address = activeAddress;
                if (!address || !isValidSuiAddress(address)) {
                    address = await connectWallet();
                    if (!address) {
                        showLockedState();
                        return;
                    }
                }

                const allowed = await hasRequiredCity(address);
                if (allowed) {
                    showVerifiedState();
                    return;
                }

                showLockedState();
                setSrStatus(INSUFFICIENT_HOLDINGS_MESSAGE);
            } catch (error) {
                showLockedState();
                clearPersistedSession();
                activeWalletEntry = null;
                activeAddress = null;
                setSrStatus(error?.message || 'Unable to verify CITY holdings. Please check your wallet connection and try again.');
            }
        }

        async function autoReconnect() {
            const session = loadPersistedSession();
            if (!session?.providerName) {
                return;
            }

            for (const delay of [600, 1200]) {
                await wait(delay);
                const wallets = discoverWallets();
                const entry = wallets.find((wallet) => wallet.name === session.providerName);
                if (!entry) {
                    continue;
                }

                try {
                    let address = session.address || '';
                    if (entry.source === 'standard') {
                        try {
                            const response = await entry.wallet.features['standard:connect'].connect({ silent: true });
                            const accounts = response?.accounts || entry.wallet.accounts || [];
                            if (!address) {
                                address = String(accounts?.[0]?.address || accounts?.[0] || '').trim();
                            }
                        } catch (_) {}
                    } else if (typeof entry.provider?.connect === 'function') {
                        try {
                            await entry.provider.connect();
                            if (!address && typeof entry.provider.getAccounts === 'function') {
                                const accounts = await entry.provider.getAccounts();
                                address = String(accounts?.[0]?.address || accounts?.[0] || '').trim();
                            }
                        } catch (_) {}
                    }

                    if (!isValidSuiAddress(address)) {
                        clearPersistedSession();
                        return;
                    }

                    activeWalletEntry = entry;
                    activeAddress = address;
                    persistSession(entry.name, address);

                    setLoadingState(true);
                    const allowed = await hasRequiredCity(address);
                    if (allowed) {
                        showVerifiedState();
                    } else {
                        showLockedState();
                        setSrStatus(INSUFFICIENT_HOLDINGS_MESSAGE);
                    }
                    return;
                } catch (_) {
                    break;
                }
            }
        }

        function handleLockedActivate() {
            if (isBusy) {
                return;
            }
            if (activeAddress) {
                disconnectActiveWallet().finally(() => verifyAccess());
                return;
            }
            verifyAccess();
        }

        lockedState.addEventListener('click', (event) => {
            if (event.target === verifyTrigger || event.target === lockedState || event.target.classList.contains('portrait')) {
                handleLockedActivate();
            }
        });

        verifyTrigger.addEventListener('click', (event) => {
            event.stopPropagation();
            handleLockedActivate();
        });

        lockedState.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                handleLockedActivate();
            }
        });

        initWalletStandard();
        showLockedState();
        autoReconnect();
    </script>
</body>
</html>
