name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual re-deployment from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel any in-progress run to avoid stale deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Resolve OpenAI proxy URL
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_PROXY_URL: ${{ secrets.OPENAI_PROXY_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -n "${OPENAI_PROXY_URL}" ]; then
            # Use the pre-provisioned proxy when one is already configured.
            echo "OPENAI_PROXY_URL=${OPENAI_PROXY_URL}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY secret is not set. Add your OpenAI API key under Settings → Secrets and variables → Actions."
            exit 1
          fi

          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            # Deploy a Cloudflare Worker proxy to keep the API key server-side.
            umask 077
            OPENAI_KEY_FILE="$(mktemp)"
            printf '%s' "${OPENAI_API_KEY}" > "${OPENAI_KEY_FILE}"
            wrangler secret put OPENAI_API_KEY --stdin --config api/openai-proxy/wrangler.toml < "${OPENAI_KEY_FILE}"
            rm -f "${OPENAI_KEY_FILE}"

            DEPLOY_RESPONSE_FILE="$(mktemp)"
            wrangler deploy --config api/openai-proxy/wrangler.toml --json > "${DEPLOY_RESPONSE_FILE}"
            DEPLOYED_URL="$(
              python - "${DEPLOY_RESPONSE_FILE}" <<'PY'
import json
import sys

with open(sys.argv[1], 'r', encoding='utf-8') as fh:
    data = json.load(fh)

url = data.get('url')
if not isinstance(url, str) or not url:
    sys.stderr.write('Error: Invalid or missing url in wrangler output\n')
    raise SystemExit(1)

print(url, end='')
PY
            )"

            if [ -z "${DEPLOYED_URL}" ]; then
              echo "::error::Unable to determine deployed OpenAI proxy URL from wrangler output."
              exit 1
            fi

            echo "OPENAI_PROXY_URL=${DEPLOYED_URL}" >> "$GITHUB_ENV"
          else
            # No Cloudflare credentials — fall back to calling OpenAI directly from the
            # browser.  The API key will be embedded in the deployed HTML, so consider
            # adding CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID for a server-side proxy.
            echo "::warning::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not set. The OpenAI API key will be embedded in the deployed HTML. Add Cloudflare secrets for a server-side proxy."
            echo "OPENAI_API_KEY_DIRECT=${OPENAI_API_KEY}" >> "$GITHUB_ENV"
          fi

      - name: Inject OpenAI proxy URL
        env:
          OPENAI_PROXY_URL: ${{ env.OPENAI_PROXY_URL }}
          OPENAI_API_KEY_DIRECT: ${{ env.OPENAI_API_KEY_DIRECT }}
        run: |
          if [ -z "${OPENAI_PROXY_URL}" ] && [ -z "${OPENAI_API_KEY_DIRECT}" ]; then
            echo "::error::Neither OPENAI_PROXY_URL nor OPENAI_API_KEY_DIRECT is available for site deployment."
            exit 1
          fi
          if [ -n "${OPENAI_PROXY_URL}" ]; then
            sed -i "s|__OPENAI_PROXY_URL__|${OPENAI_PROXY_URL}|g" analyze/index.html
          fi
          if [ -n "${OPENAI_API_KEY_DIRECT}" ]; then
            sed -i "s|__OPENAI_API_KEY__|${OPENAI_API_KEY_DIRECT}|g" analyze/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (all static files)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
