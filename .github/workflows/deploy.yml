name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual re-deployment from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel any in-progress run to avoid stale deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Resolve OpenAI proxy URL
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_PROXY_URL: ${{ secrets.OPENAI_PROXY_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -n "${OPENAI_PROXY_URL}" ]; then
            # Use the pre-provisioned proxy when one is already configured.
            echo "OPENAI_PROXY_URL=${OPENAI_PROXY_URL}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::warning::OPENAI_API_KEY secret is not set. The AI analyzer feature will be unavailable. Add it under Settings → Secrets and variables → Actions."
            exit 0
          fi

          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set. Cannot deploy the OpenAI proxy. The AI analyzer feature will be unavailable."
            exit 0
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID not set. Cannot deploy the OpenAI proxy. The AI analyzer feature will be unavailable."
            exit 0
          fi

          umask 077
          OPENAI_KEY_FILE="$(mktemp)"
          printf '%s' "${OPENAI_API_KEY}" > "${OPENAI_KEY_FILE}"
          wrangler secret put OPENAI_API_KEY --stdin --config api/openai-proxy/wrangler.toml < "${OPENAI_KEY_FILE}"
          rm -f "${OPENAI_KEY_FILE}"

          DEPLOY_RESPONSE_FILE="$(mktemp)"
          wrangler deploy --config api/openai-proxy/wrangler.toml --json > "${DEPLOY_RESPONSE_FILE}"
          if ! DEPLOYED_URL="$(jq -r '.url // empty' "${DEPLOY_RESPONSE_FILE}")"; then
            echo "::error::Failed to parse wrangler deploy output as JSON."
            exit 1
          fi

          if [ -z "${DEPLOYED_URL}" ]; then
            echo "::error::Unable to determine deployed OpenAI proxy URL from wrangler output."
            exit 1
          fi

          echo "OPENAI_PROXY_URL=${DEPLOYED_URL}" >> "$GITHUB_ENV"

      - name: Inject OpenAI proxy URL
        env:
          OPENAI_PROXY_URL: ${{ env.OPENAI_PROXY_URL }}
        run: |
          if [ -z "${OPENAI_PROXY_URL}" ]; then
            echo "::notice::No OpenAI proxy URL configured — skipping injection. The AI analyzer feature will be unavailable."
          else
            sed -i "s|__OPENAI_PROXY_URL__|${OPENAI_PROXY_URL}|g" analyze/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (all static files)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
