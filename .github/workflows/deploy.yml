name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual re-deployment from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel any in-progress run to avoid stale deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve OpenAI proxy URL
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_PROXY_URL: ${{ secrets.OPENAI_PROXY_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -n "${OPENAI_PROXY_URL}" ]; then
            echo "OPENAI_PROXY_URL=${OPENAI_PROXY_URL}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY secret is not set. Add your OpenAI API key under Settings → Secrets and variables → Actions."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Set OPENAI_PROXY_URL or provide CLOUDFLARE_API_TOKEN so the workflow can deploy api/openai-proxy with the OPENAI_API_KEY secret."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Set OPENAI_PROXY_URL or provide CLOUDFLARE_ACCOUNT_ID so the workflow can deploy api/openai-proxy with the OPENAI_API_KEY secret."
            exit 1
          fi

          echo "${OPENAI_API_KEY}" | npx wrangler secret put OPENAI_API_KEY --stdin --config api/openai-proxy/wrangler.toml

          DEPLOY_RESPONSE="$(npx wrangler deploy --config api/openai-proxy/wrangler.toml --json)"
          export DEPLOY_RESPONSE
          DEPLOYED_URL="$(
            node -e "try { const data = JSON.parse(process.env.DEPLOY_RESPONSE || '{}'); if (!data.url || typeof data.url !== 'string') process.exit(1); process.stdout.write(data.url); } catch (_) { process.exit(1); }"
          )"

          if [ -z "${DEPLOYED_URL}" ]; then
            echo "::error::Unable to determine deployed OpenAI proxy URL from wrangler output."
            exit 1
          fi

          echo "OPENAI_PROXY_URL=${DEPLOYED_URL}" >> "$GITHUB_ENV"

      - name: Inject OpenAI proxy URL
        env:
          OPENAI_PROXY_URL: ${{ env.OPENAI_PROXY_URL }}
        run: |
          if [ -z "${OPENAI_PROXY_URL}" ]; then
            echo "::error::OPENAI_PROXY_URL is not available for site deployment."
            exit 1
          fi
          sed -i "s|__OPENAI_PROXY_URL__|${OPENAI_PROXY_URL}|g" analyze/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (all static files)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
