name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual re-deployment from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel any in-progress run to avoid stale deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Build SUI browser client
        run: |
          npm ci
          npm run build

      - name: Generate public Sluice V2 runtime config
        env:
          SLUICE_NETWORK: mainnet
          SLUICE_V2_PACKAGE_ADDRESS: ${{ vars.SLUICE_V2_PACKAGE_ADDRESS }}
          SLUICE_LEGACY_PACKAGE_ADDRESS: ${{ vars.SLUICE_LEGACY_PACKAGE_ADDRESS }}
          SLUICE_ORACLE_PUBLIC_KEYS: ${{ vars.SLUICE_ORACLE_PUBLIC_KEYS }}
          SLUICE_ORACLE_THRESHOLD: ${{ vars.SLUICE_ORACLE_THRESHOLD }}
        run: node scripts/build-sluice-config.js

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Resolve OpenAI proxy URL
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_PROXY_URL: ${{ secrets.OPENAI_PROXY_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -n "${OPENAI_PROXY_URL}" ]; then
            # Use the pre-provisioned proxy when one is already configured.
            echo "OPENAI_PROXY_URL=${OPENAI_PROXY_URL}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::warning::OPENAI_API_KEY secret is not set. The AI intelligence feature will be unavailable. Add it under Settings → Secrets and variables → Actions."
            exit 0
          fi

          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set. Cannot deploy the OpenAI proxy. The AI intelligence feature will be unavailable."
            exit 0
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID not set. Cannot deploy the OpenAI proxy. The AI intelligence feature will be unavailable."
            exit 0
          fi

          echo -n "${OPENAI_API_KEY}" | wrangler secret put OPENAI_API_KEY --config api/openai-proxy/wrangler.toml

          DEPLOY_OUTPUT="$(wrangler deploy --config api/openai-proxy/wrangler.toml)"
          DEPLOYED_URL="$(echo "${DEPLOY_OUTPUT}" | grep -oE "https://[a-zA-Z0-9.-]+\.workers\.dev" | head -n 1)"

          if [ -z "${DEPLOYED_URL}" ]; then
            echo "::error::Unable to determine deployed OpenAI proxy URL from wrangler output."
            echo "Wrangler deploy output was:"
            echo "${DEPLOY_OUTPUT}"
            exit 1
          fi

          echo "OPENAI_PROXY_URL=${DEPLOYED_URL}" >> "$GITHUB_ENV"

      - name: Inject OpenAI proxy URL
        env:
          OPENAI_PROXY_URL: ${{ env.OPENAI_PROXY_URL }}
        run: |
          if [ -z "${OPENAI_PROXY_URL}" ]; then
            echo "::notice::No OpenAI proxy URL configured — skipping injection. The AI intelligence feature will be unavailable."
          else
            sed -i "s|__OPENAI_PROXY_URL__|${OPENAI_PROXY_URL}|g" intel/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload the entire repository root (all static files)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
