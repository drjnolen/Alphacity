name: Sluice Vesting Relayer Bot

on:
  schedule:
    # Offset from the top of the hour to reduce GitHub-hosted cron congestion.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

permissions:
  contents: read

concurrency:
  group: sluice-v2-relayer
  cancel-in-progress: false

jobs:
  run-relayer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Submit signed V2 observations on-chain
        env:
          SLUICE_V2_PACKAGE_ADDRESS: ${{ vars.SLUICE_V2_PACKAGE_ADDRESS }}
          SLUICE_ORACLE_PRIVATE_KEYS: ${{ secrets.SLUICE_ORACLE_PRIVATE_KEYS }}
          SLUICE_RELAYER_PRIVATE_KEY: ${{ secrets.SLUICE_RELAYER_PRIVATE_KEY }}
          SUI_GRAPHQL_URL: ${{ vars.SUI_GRAPHQL_URL }}
          SUI_GRPC_URL: ${{ vars.SUI_GRPC_URL }}
        run: node scripts/sluice-relayer.js
