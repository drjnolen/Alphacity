name: Sluice Vesting Relayer Bot

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

permissions:
  contents: write

jobs:
  run-relayer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can commit/push back to the main branch
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Sluice Relayer Script
        env:
          SLUICE_ORACLE_PRIVATE_KEY: ${{ secrets.SLUICE_ORACLE_PRIVATE_KEY }}
          SLUICE_PACKAGE_ADDRESS: ${{ secrets.SLUICE_PACKAGE_ADDRESS }}
        run: |
          node scripts/sluice-relayer.js
