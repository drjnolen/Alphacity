<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GuildSafe Wallet Verify</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22c55e;
      --accent2: #0ea5e9;
      --danger: #ef4444;
      --border: #334155;
    }
    body {
      margin: 0;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, Arial, sans-serif;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    h2 { margin: 0 0 8px 0; font-size: 20px; }
    p { margin: 8px 0; color: var(--muted); }
    .pill {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #1f2937;
      border: 1px solid var(--border);
      display: inline-block;
      margin-right: 8px;
    }
    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #0f172a;
      border: 1px solid var(--border);
      font-size: 14px;
      text-align: center;
    }
    #walletAddress {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #0f172a;
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--accent2);
      word-break: break-all;
      display: none;
    }
    #tokenBalance {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #0f172a;
      border: 1px solid var(--border);
      font-size: 13px;
      word-break: break-all;
      display: none;
    }
    button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: none;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      display: none;
    }
    .btn-retry { background: var(--accent2); color: #062033; }

    /* Wallet picker */
    #walletPicker {
      margin-top: 16px;
      display: none;
    }
    #walletPicker p {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: var(--muted);
    }
    .wallet-option {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: left;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    .wallet-option:hover {
      border-color: var(--accent2);
      background: #0f2033;
    }
    /* Account picker */
    #accountPicker {
      margin-top: 16px;
      display: none;
    }
    #accountPicker p {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: var(--muted);
    }
    .account-option {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: left;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--accent2);
      font-size: 13px;
      font-family: monospace;
      cursor: pointer;
      margin-top: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    .account-option:hover {
      border-color: var(--accent2);
      background: #0f2033;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h2>GuildSafe Wallet Verification</h2>
    <p>Connect your Sui wallet and sign a challenge to verify ownership.</p>

    <div>
      <span class="pill" id="ctxGroup">group: -</span>
      <span class="pill" id="ctxUser">user: -</span>
      <span class="pill" id="ctxToken" style="display:none">token: -</span>
      <span class="pill" id="ctxMinBalance" style="display:none">min: -</span>
    </div>

    <div id="status"><span class="spinner"></span> Looking for wallets&hellip;</div>
    <div id="walletPicker">
      <p>Select a wallet provider:</p>
      <div id="walletList"></div>
    </div>
    <div id="accountPicker">
      <p>Select an account:</p>
      <div id="accountList"></div>
    </div>
    <div id="walletAddress"></div>
    <div id="tokenBalance"></div>
    <button class="btn-retry" id="retryBtn">Retry</button>
  </div>

  <script>
    // ---------- Telegram context ----------
    const tg = window.Telegram?.WebApp || null;
    if (tg) tg.ready();

    const BOT_USERNAME = 'GuildSafeBot';

    const qs = new URLSearchParams(window.location.search);
    const groupId = qs.get('group_id') || '';
    const tgUserId = qs.get('tg_user_id') || '';
    const tokenType = qs.get('token_type') || '';
    const minBalance = qs.get('min_balance') || qs.get('required_balance') || '0';

    document.getElementById('ctxGroup').textContent = `group: ${groupId || '-'}`;
    document.getElementById('ctxUser').textContent = `user: ${tgUserId || '-'}`;

    if (tokenType) {
      const shortToken = tokenType.split('::').pop() || tokenType;
      const ctxTokenEl = document.getElementById('ctxToken');
      ctxTokenEl.textContent = `token: ${shortToken}`;
      ctxTokenEl.style.display = 'inline-block';
      const ctxMinEl = document.getElementById('ctxMinBalance');
      ctxMinEl.textContent = `min: ${minBalance}`;
      ctxMinEl.style.display = 'inline-block';
    }

    // ---------- UI refs ----------
    const statusEl = document.getElementById('status');
    const walletAddressEl = document.getElementById('walletAddress');
    const tokenBalanceEl = document.getElementById('tokenBalance');
    const retryBtn = document.getElementById('retryBtn');
    const walletPickerEl = document.getElementById('walletPicker');
    const walletListEl = document.getElementById('walletList');
    const accountPickerEl = document.getElementById('accountPicker');
    const accountPickerLabel = accountPickerEl.querySelector('p');
    const accountListEl = document.getElementById('accountList');

    function setStatus(html) { statusEl.innerHTML = html; }
    function showRetry() { retryBtn.style.display = 'block'; }
    function showWalletPicker() { walletPickerEl.style.display = 'block'; }
    function hideWalletPicker() { walletPickerEl.style.display = 'none'; }
    function showAccountPicker() { accountPickerEl.style.display = 'block'; }
    function hideAccountPicker() { accountPickerEl.style.display = 'none'; }

    function showTelegramFallback(walletAddress) {
      // The page was opened inside Telegram but not as a proper WebApp,
      // so sendData() is unavailable.  Direct the user back to the bot
      // where the /register flow can finalise their registration.
      const deepLink = groupId
        ? `https://t.me/${BOT_USERNAME}?start=register_${groupId}`
        : `https://t.me/${BOT_USERNAME}`;
      const short = walletAddress.length > 14
        ? walletAddress.slice(0, 6) + '&hellip;' + walletAddress.slice(-4)
        : walletAddress;
      setStatus(
        '&#x2705; Wallet <b>' + short + '</b> verified on-chain!<br><br>' +
        'To complete your group registration, return to the bot and run ' +
        '<b>/register ' + walletAddress + '</b><br><br>' +
        '<a href="' + deepLink + '" style="color:var(--accent2)">Open GuildSafe Bot &rarr;</a>'
      );
    }

    // ---------- Helpers ----------
    const enc = new TextEncoder();

    // ---------- Wallet Standard API ----------
    // Mirrors the approach used by the staking page to discover wallets
    // via the Wallet Standard (https://github.com/wallet-standard/wallet-standard)
    const registeredWallets = new Set();
    let walletListCache;

    function registerWallet(wallet) {
      walletListCache = undefined;
      registeredWallets.add(wallet);
    }

    function getRegisteredWallets() {
      if (!walletListCache) walletListCache = [...registeredWallets];
      return walletListCache;
    }

    function initWalletStandard() {
      const appApi = Object.freeze({ register: (...wallets) => {
        wallets.forEach(w => registerWallet(w));
      }});

      try {
        window.addEventListener('wallet-standard:register-wallet', (e) => e.detail(appApi));
      } catch (err) {
        console.error('wallet-standard:register-wallet listener error', err);
      }

      try {
        window.dispatchEvent(new CustomWalletEvent(appApi));
      } catch (err) {
        console.error('wallet-standard:app-ready dispatch error', err);
      }
    }

    class CustomWalletEvent extends Event {
      #api;
      get detail() { return this.#api; }
      get type() { return 'wallet-standard:app-ready'; }
      constructor(api) {
        super('wallet-standard:app-ready', { bubbles: false, cancelable: false, composed: false });
        this.#api = api;
      }
    }

    // ---------- Wallet discovery ----------
    function discoverWallets() {
      const found = [];
      const seen = new Set();

      // 1. Wallet Standard wallets (preferred — used by Slush, Sui Wallet, etc.)
      for (const w of getRegisteredWallets()) {
        const hasConnect = !!w.features?.['standard:connect'];
        const hasSign = !!w.features?.['sui:signPersonalMessage'];
        if (hasConnect && hasSign && !seen.has(w.name)) {
          seen.add(w.name);
          found.push({ source: 'standard', name: w.name, wallet: w });
        }
      }

      // 2. Legacy global providers as fallback
      const legacy = [
        { name: 'Slush', obj: window.slush?.sui || window.slush },
        { name: 'Sui Wallet', obj: window.suiWallet },
        { name: 'Sui', obj: window.sui },
        { name: 'Martian', obj: window.martian?.sui || window.martian },
        { name: 'Ethos', obj: window.ethos?.sui || window.ethos },
      ];
      for (const c of legacy) {
        if (c.obj && !seen.has(c.name)) {
          seen.add(c.name);
          found.push({ source: 'legacy', name: c.name, provider: c.obj });
        }
      }

      return found;
    }

    function isValidSuiAddress(a) {
      return /^0x[0-9a-fA-F]{40,64}$/.test((a || '').trim());
    }

    function makeChallenge(addr, tokenBal) {
      const nonce = crypto.randomUUID
        ? crypto.randomUUID()
        : Array.from(crypto.getRandomValues(new Uint8Array(16)), b => b.toString(16).padStart(2, '0')).join('');
      const ts = Date.now();
      let text =
`GuildSafe Wallet Verification
Group: ${groupId}
TelegramUser: ${tgUserId}
Wallet: ${addr}`;
      if (tokenType && tokenBal !== null && tokenBal !== undefined) {
        text += `\nToken: ${tokenType}`;
        text += `\nRequiredBalance: ${minBalance}`;
        text += `\nTokenBalance: ${tokenBal}`;
      }
      text += `\nNonce: ${nonce}`;
      text += `\nTimestamp: ${ts}`;
      return { nonce, ts, text };
    }

    function bytesToB64(bytes) {
      try {
        const arr = Array.from(bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes));
        return btoa(String.fromCharCode(...arr));
      } catch {
        return null;
      }
    }

    function normalizeSigResult(r) {
      return {
        signature: r?.signature || r?.signatureBase64 || r?.signedMessage || null,
        bytes: r?.bytes || r?.messageBytes || null,
        publicKey: r?.publicKey || r?.pubKey || null,
        scheme: r?.signatureScheme || r?.scheme || null,
        raw: r
      };
    }

    // ---------- Token balance check ----------
    async function getSuiTokenBalance(address, coinType) {
      const res = await fetch('https://fullnode.mainnet.sui.io', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          jsonrpc: '2.0',
          id: 1,
          method: 'suix_getBalance',
          params: [address, coinType]
        })
      });
      if (!res.ok) throw new Error('Failed to fetch token balance from Sui RPC (HTTP ' + res.status + ' ' + res.statusText + ')');
      const data = await res.json();
      if (data.error) throw new Error('RPC error: ' + data.error.message);
      return data?.result?.totalBalance || '0';
    }

    // ---------- Connect & sign via Wallet Standard ----------
    async function connectStandard(entry) {
      const w = entry.wallet;
      const connectFeature = w.features['standard:connect'];
      const result = await connectFeature.connect();
      const accounts = result?.accounts || w.accounts || [];
      const suiAccounts = accounts.filter(a => !a.chains || a.chains.includes('sui:mainnet'));
      const allAccounts = suiAccounts.length ? suiAccounts : accounts;
      return { accounts: allAccounts };
    }

    async function signStandard(entry, account, msgBytes) {
      const signFeature = entry.wallet.features['sui:signPersonalMessage'];
      const result = await signFeature.signPersonalMessage({ message: msgBytes, account });
      return Array.isArray(result) ? result[0] : result;
    }

    // ---------- Connect & sign via legacy provider ----------
    async function connectLegacy(entry) {
      const p = entry.provider;
      if (typeof p.connect === 'function') await p.connect();

      let addrs = [];
      if (typeof p.getAccounts === 'function') {
        const accts = await p.getAccounts();
        addrs = (accts || []).map(a => a?.address || a).filter(Boolean);
      }
      if (!addrs.length && Array.isArray(p.accounts)) {
        addrs = p.accounts.map(a => a?.address || a).filter(Boolean);
      }
      if (!addrs.length && typeof p.account === 'string') {
        addrs = [p.account];
      }
      return { accounts: addrs.map(addr => ({ address: addr })) };
    }

    async function signLegacy(entry, msgBytes, challengeText) {
      const p = entry.provider;
      if (typeof p.signPersonalMessage === 'function') {
        return await p.signPersonalMessage({ message: msgBytes });
      } else if (typeof p.signMessage === 'function') {
        return await p.signMessage({ message: challengeText });
      }
      throw new Error('This wallet does not support message signing.');
    }

    // ---------- Wallet selection UI ----------
    function pickWallet(wallets) {
      return new Promise((resolve) => {
        walletListEl.innerHTML = '';
        wallets.forEach(entry => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'wallet-option';
          btn.textContent = entry.name;
          btn.addEventListener('click', () => {
            hideWalletPicker();
            resolve(entry);
          });
          walletListEl.appendChild(btn);
        });
        showWalletPicker();
      });
    }

    function shortAddr(addr) {
      // Addresses shorter than 11 chars can't be meaningfully shortened (6 + ... + 4 = 13 chars)
      if (!addr || addr.length < 11) return addr;
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    function pickAccount(accounts, walletName) {
      if (accounts.length === 1) return Promise.resolve(accounts[0]);
      return new Promise((resolve) => {
        accountListEl.innerHTML = '';
        accountPickerLabel.textContent =
          `Multiple accounts found in ${walletName}. Select one:`;
        accounts.forEach(account => {
          const addr = account?.address || account;
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'account-option';
          btn.textContent = shortAddr(addr);
          btn.title = addr;
          btn.addEventListener('click', () => {
            hideAccountPicker();
            resolve(account);
          });
          accountListEl.appendChild(btn);
        });
        showAccountPicker();
      });
    }

    // ---------- Main verification flow ----------
    async function verify() {
      retryBtn.style.display = 'none';
      hideWalletPicker();
      hideAccountPicker();
      tokenBalanceEl.style.display = 'none';
      setStatus('<span class="spinner"></span> Looking for wallets&hellip;');

      // 1. Discover wallets (standard + legacy)
      const wallets = discoverWallets();
      if (!wallets.length) {
        setStatus('&#x26A0;&#xFE0F; No Sui wallet found. Please open this page in a wallet-enabled browser.');
        showRetry();
        return;
      }

      // 2. Let user choose their wallet provider
      setStatus('Select a wallet to continue.');
      const entry = await pickWallet(wallets);

      // 3. Connect and get accounts
      setStatus('<span class="spinner"></span> Connecting to ' + entry.name + '&hellip;');
      let rawAccounts;
      if (entry.source === 'standard') {
        ({ accounts: rawAccounts } = await connectStandard(entry));
      } else {
        ({ accounts: rawAccounts } = await connectLegacy(entry));
      }

      if (!rawAccounts || !rawAccounts.length) {
        setStatus('&#x26A0;&#xFE0F; ' + entry.name + ' did not provide any Sui accounts.');
        showRetry();
        return;
      }

      // 4. Let user pick an account if multiple are available
      const account = await pickAccount(rawAccounts, entry.name);
      const address = String(account?.address || account || '').trim();

      if (!address || !isValidSuiAddress(address)) {
        setStatus('&#x26A0;&#xFE0F; Wallet did not provide a valid Sui address.');
        showRetry();
        return;
      }

      walletAddressEl.textContent = address;
      walletAddressEl.style.display = 'block';

      // 5. Check token balance against required threshold
      let tokenBalance = null;
      let balanceVerified = null;
      if (tokenType) {
        setStatus('<span class="spinner"></span> Checking token balance&hellip;');
        try {
          tokenBalance = await getSuiTokenBalance(address, tokenType);
          try {
            balanceVerified = BigInt(tokenBalance) >= BigInt(minBalance);
          } catch (bigIntErr) {
            console.error('BigInt comparison failed:', bigIntErr);
            balanceVerified = false;
          }
          tokenBalanceEl.textContent = balanceVerified
            ? `\u2705 Token balance: ${tokenBalance} (meets threshold: ${minBalance})`
            : `\u26A0\uFE0F Token balance: ${tokenBalance} (below threshold: ${minBalance})`;
          tokenBalanceEl.style.color = balanceVerified ? 'var(--accent)' : 'var(--danger)';
          tokenBalanceEl.style.display = 'block';
        } catch (e) {
          setStatus(`&#x26A0;&#xFE0F; Failed to check token balance: ${e?.message || e}`);
          showRetry();
          return;
        }
      }

      // 6. Sign challenge to prove wallet ownership
      setStatus('<span class="spinner"></span> Signing verification challenge&hellip;');

      const c = makeChallenge(address, tokenBalance);
      const challenge = c.text;
      const msgBytes = enc.encode(challenge);
      let res = null;

      if (entry.source === 'standard') {
        res = await signStandard(entry, account, msgBytes);
      } else {
        res = await signLegacy(entry, msgBytes, challenge);
      }

      const norm = normalizeSigResult(res);

      // 7. Submit signed payload to Telegram bot
      setStatus('<span class="spinner"></span> Submitting for verification&hellip;');

      const signaturePayload = {
        wallet_address: address,
        group_id: groupId,
        tg_user_id: tgUserId,
        provider: entry.name,
        challenge,
        signature: norm.signature || null,
        signature_bytes_b64: norm.bytes ? bytesToB64(norm.bytes) : null,
        public_key: norm.publicKey || null,
        signature_scheme: norm.scheme || null,
        signed_at: Date.now(),
        token_type: tokenType || null,
        required_balance: tokenType ? minBalance : null,
        token_balance: tokenBalance,
        balance_verified: balanceVerified
      };

      const payload = JSON.stringify(signaturePayload);

      // tg.initData is non-empty only when the page was opened as a proper
      // Telegram WebApp (e.g. via a web_app keyboard button).  When opened
      // through a regular URL button sendData() exists but silently fails.
      if (tg?.sendData && tg.initData) {
        try {
          tg.sendData(payload);
          setStatus('&#x2705; Wallet verified! Returning to Telegram&hellip;');
          // Brief delay so sendData() completes before the WebApp is closed.
          setTimeout(() => { try { tg.close(); } catch (_) {} }, 500);
        } catch (e) {
          console.error('sendData failed:', e);
          showTelegramFallback(address);
        }
      } else if (tg) {
        // Opened inside Telegram but not as a full WebApp (e.g. URL button).
        showTelegramFallback(address);
      } else {
        navigator.clipboard?.writeText(payload);
        setStatus('&#x2705; Verified (debug mode &mdash; payload copied to clipboard).');
      }
    }

    // ---------- Error handling ----------
    function handleError(err) {
      hideWalletPicker();
      hideAccountPicker();
      setStatus(`&#x274C; Error: ${err?.message || err}`);
      showRetry();
    }

    retryBtn.addEventListener('click', () => verify().catch(handleError));

    initWalletStandard();

    // Auto-trigger the wallet picker on load.
    // Wallet Standard wallets register asynchronously, so retry at short
    // intervals before giving up and showing an error.
    // discoverWallets() only iterates in-memory Sets and window globals — lightweight.
    const WALLET_RETRY_DELAYS = [0, 800, 2500]; // intermediate checks
    const WALLET_FINAL_DELAY = 5000;            // last-resort trigger regardless of discovery
    let started = false;

    function attemptStart() {
      if (started) return;
      if (discoverWallets().length > 0) {
        started = true;
        verify().catch(handleError);
      }
    }

    WALLET_RETRY_DELAYS.forEach(delay => setTimeout(attemptStart, delay));

    // Final fallback: start regardless after WALLET_FINAL_DELAY (wallets may be
    // slow to register, and verify() will surface the "no wallet" error itself)
    setTimeout(() => {
      if (!started) {
        started = true;
        verify().catch(handleError);
      }
    }, WALLET_FINAL_DELAY);
  </script>
</body>
</html>
